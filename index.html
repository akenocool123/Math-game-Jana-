    const chapterSelect = document.getElementById('chapterSelect');
    const summaryDiv = document.getElementById('summary');
    const startBtn = document.getElementById('startBtn');
    const quizDiv = document.getElementById('quiz');
    const questionContainer = document.getElementById('questionContainer');
    const optionsDiv = document.getElementById('options');
    const nextBtn = document.getElementById('nextBtn');
    const resultDiv = document.getElementById('result');

    let currentChapter = null;
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedAnswers = [];

    // Populate chapter dropdown
    chapters.forEach((chap, index) => {
      const option = document.createElement('option');
      option.value = index;
      option.textContent = (index + 1) + '. ' + chap.title;
      chapterSelect.appendChild(option);
    });

    chapterSelect.addEventListener('change', () => {
      const idx = parseInt(chapterSelect.value);
      currentChapter = chapters[idx];
      // Populate summary and optional image
      if (currentChapter.img) {
        summaryDiv.innerHTML = '<p>' + currentChapter.summary + '</p>' +
          '<img src="' + currentChapter.img + '" alt="' + currentChapter.title + ' diagram" style="max-width:100%;height:auto;margin-top:0.5rem;">';
      } else {
        summaryDiv.textContent = currentChapter.summary;
      }
      startBtn.classList.remove('hidden');
      quizDiv.classList.add('hidden');
      // Clear any previous results and hide the result container
      resultDiv.innerHTML = '';
      resultDiv.classList.add('hidden');
    });

    startBtn.addEventListener('click', () => {
      if (!currentChapter) return;
      // Copy questions and shuffle
      currentQuestions = [...currentChapter.questions];
      // Shuffle questions
      for (let i = currentQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
      }
      currentQuestionIndex = 0;
      score = 0;
      selectedAnswers = [];
      quizDiv.classList.remove('hidden');
      startBtn.classList.add('hidden');
      // Hide previous results when starting a new quiz
      resultDiv.classList.add('hidden');
      displayQuestion();
    });

    function displayQuestion() {
      const qObj = currentQuestions[currentQuestionIndex];
      questionContainer.textContent = 'Question ' + (currentQuestionIndex + 1) + ': ' + qObj.q;
      optionsDiv.innerHTML = '';
      qObj.options.forEach((optionText, idx) => {
        const label = document.createElement('label');
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'option';
        radio.value = idx;
        label.appendChild(radio);
        label.appendChild(document.createTextNode(' ' + optionText));
        optionsDiv.appendChild(label);
      });
      resultDiv.textContent = '';
    }

    nextBtn.addEventListener('click', () => {
      // Check selected answer
      const selected = document.querySelector('input[name="option"]:checked');
      if (!selected) {
        alert('Please select an answer before proceeding.');
        return;
      }
      const ans = parseInt(selected.value);
      const correctAns = currentQuestions[currentQuestionIndex].answer;
      // Record selected answer
      selectedAnswers.push(ans);
      if (ans === correctAns) {
        score++;
      }
      currentQuestionIndex++;
      if (currentQuestionIndex < currentQuestions.length) {
        displayQuestion();
      } else {
        // Build result summary
        quizDiv.classList.add('hidden');
        startBtn.classList.remove('hidden');
        let summaryHtml = '<h3>Quiz Results</h3>';
        summaryHtml += '<p>You scored ' + score + ' out of ' + currentQuestions.length + '.</p>';
        currentQuestions.forEach((qObj, idx) => {
          const userAns = selectedAnswers[idx];
          const correct = qObj.answer;
          const isCorrect = userAns === correct;
          summaryHtml += '<div style="margin-bottom:0.5rem;">' +
            '<strong>Q' + (idx + 1) + ':</strong> ' + qObj.q + '<br>' +
            'Your answer: <span style="color:' + (isCorrect ? 'green' : 'red') + ';">' + (qObj.options[userAns] ?? 'No answer') + '</span><br>' +
            'Correct answer: <span style="color:green;">' + qObj.options[correct] + '</span>' +
          '</div>';
        });
        resultDiv.innerHTML = summaryHtml;
        // Show the result container
        resultDiv.classList.remove('hidden');
      }
    });
